# GitHub Actions: adversarial PR reviewer (ADR-0017).
#
# Rendered by terraform/github.tf's `github_repository_file.review_pr_workflow`
# resource, one per active project (for_each = local.active_projects).
#
# Template vars:
#   ${gh_owner} — the project manifest's github.org (cyrus's branch-prefix matcher)
#
# Why the branch-prefix filter exists: Phase 2 Step 3's Commit E surfaced
# (Lessons #36-#39) that cyrus emits PRs on branches shaped
# `<gh-owner>/<lin-id-lower>-<slug>` (e.g. mitekk/mit-5-m2-warmup), with
# `cyrusdevelopment-orchest/...` also seen in some setups.
#
# Prompt-shape design (Lesson #47 + iter-5 finding):
#   The action's `prompt:` input is the user-message-equivalent under the
#   claude_code system preset. If we pass the full reviewer document body
#   as the prompt, claude reads it as "here's a document about a reviewer"
#   and asks for clarification instead of executing. Iterations 1-4 fought
#   this by tightening the document's framing (second-person imperative,
#   "execute now," explicit Bash requirement); claude still found the file
#   on disk and identified the message as documentation about the file.
#
#   The fix: pass a SHORT IMPERATIVE TASK as `prompt:` and reference the
#   full procedure as a document claude reads via the Read tool. The task
#   is "review this PR, follow the procedure"; the document is reference
#   material, not the conversation message.
#
# DO NOT hand-edit on the project repo. Terraform's overwrite_on_create=true
# will revert the edit on the next `terraform apply`. To change shape,
# edit this template + re-run apply.

name: Adversarial PR Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      startsWith(github.event.pull_request.head.ref, 'mitekk/') ||
      startsWith(github.event.pull_request.head.ref, 'cyrusdevelopment-orchest/')

    permissions:
      contents: read
      pull-requests: write   # required for `gh pr review`
      id-token: write        # required by anthropics/claude-code-action@v1 for OIDC

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0   # so the reviewer can walk git log

      - name: Run adversarial reviewer
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Short imperative task — references the procedure document
          # rather than embedding it. See the "Prompt-shape design" comment
          # block above for why this beats inlining the full document body.
          prompt: |
            Perform an adversarial code review of pull request #${{ github.event.pull_request.number }} in this repository.

            Read `.github/reviewer-prompt.md` first — it contains the review procedure (hard rules, step-by-step, output shape, and tool allowlist). Then execute that procedure against this PR's diff right now.

            Required final action: invoke the Bash tool to run exactly one of:
              gh pr review "$PR_NUMBER" --approve --body "<one-paragraph summary>"
            OR
              gh pr review "$PR_NUMBER" --request-changes --body "<your findings>"

            Text-only responses do not count as a review and leave the PR un-reviewed. You MUST invoke the Bash tool to post the review before your turn ends. Do not ask clarifying questions — execute the procedure now.
          claude_args: --model claude-sonnet-4-6 --max-turns 15 --allowed-tools Read,Bash,Grep,Glob
          # Observability for the Phase 2 Step 4 ramp. Flip off once the
          # reviewer is stable + posting reliably.
          show_full_output: "true"
          display_report: "true"
